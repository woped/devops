name: Docker Build and Push (Python)

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to use for image tagging (e.g., v1.2.3)'
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Resolve release tag and image metadata
        id: image_meta
        shell: bash
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY#*/}"

          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ] && [ -n "${{ github.ref_name }}" ]; then
            TAG="${{ github.ref_name }}"
          else
            echo "Could not determine tag. Pass inputs.tag or run this workflow from a tag ref."
            exit 1
          fi

          if [ -z "$TAG" ]; then
            echo "Could not determine Docker image tag"
            exit 1
          fi

          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Tag must be in format v<semver>, got: $TAG"
            exit 1
          fi

          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            woped/${{ steps.image_meta.outputs.image_name }}:${{ steps.image_meta.outputs.tag }}
            woped/${{ steps.image_meta.outputs.image_name }}:${{ steps.image_meta.outputs.version }}
            woped/${{ steps.image_meta.outputs.image_name }}:${{ steps.image_meta.outputs.major }}.${{ steps.image_meta.outputs.minor }}
            woped/${{ steps.image_meta.outputs.image_name }}:${{ steps.image_meta.outputs.major }}
            woped/${{ steps.image_meta.outputs.image_name }}:sha-${{ github.sha }}
            woped/${{ steps.image_meta.outputs.image_name }}:latest
